name: CI

on:
  pull_request:
  push:
    branches: [ dev, ci/** ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: cargo run -p xtask -- ci-format

  check:
    name: Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2

      - run: cargo run -p xtask -- check

  clippy:
    name: Clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, clippy

      - uses: Swatinem/rust-cache@v2

      - run: cargo run -p xtask -- clippy

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo run -p xtask -- test

  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2

      - name: Cache bpf-linker
        uses: actions/cache@v4
        id: bpf-linker-cache
        with:
          path: ~/.cargo/bin/bpf-linker
          key: bpf-linker-${{ runner.os }}-v0.1

      - name: Install bpf-linker
        if: steps.bpf-linker-cache.outputs.cache-hit != 'true'
        run: cargo install bpf-linker --locked

      - run: cargo run -p xtask -- build

  ebpf-smoke:
    name: eBPF smoke test
    runs-on: ubuntu-24.04
    needs: [fmt, check, clippy, test, build]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2

      - name: Cache bpf-linker
        uses: actions/cache@v4
        id: bpf-linker-cache
        with:
          path: ~/.cargo/bin/bpf-linker
          key: bpf-linker-${{ runner.os }}-v0.1

      - name: Install bpf-linker
        if: steps.bpf-linker-cache.outputs.cache-hit != 'true'
        run: cargo install bpf-linker --locked

      - name: Install runtime tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            linux-tools-common \
            linux-tools-generic \
            linux-tools-azure \
            linux-cloud-tools-azure

      - name: Show kernel and BTF info
        run: |
          uname -a
          test -e /sys/kernel/btf/vmlinux
          which bpftool || true
          sudo bpftool feature probe kernel || true

      - run: cargo run -p xtask -- ci-smoke
