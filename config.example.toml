[agent]
id = "dev-host-001"
mode = "monitor" # monitor | detect
log_level = "info"

[ebpf]
enabled = true
buffer_size = 8192

[events]
process = true
file = true
# Set both events.network and network.enabled to true to collect network syscall telemetry.
network = false

[process]
enabled = true
hooks = ["execve", "fork", "exit", "execveat"]
collect_args = false
collect_env = false
collect_cwd = false

[file]
enabled = true
hooks = ["openat", "openat2", "write", "rename", "renameat2", "unlink", "unlinkat"]
# Add a staging path such as "/tmp" to watch_paths and remove it from exclude_paths
# when demoing BUILTIN-SCENARIO-DROP-EXEC-001 in a disposable environment.
watch_paths = ["/etc", "/usr/bin", "/bin"]
watch_patterns = ["*.service"]
exclude_paths = ["/var/log", "/tmp", "/proc", "/sys"]

[network]
enabled = false
hooks = ["connect", "bind", "listen"]
collect_dns = false
collect_payload = false

[[rules]]
id = "PROC-001"
name = "Shell spawned by web server"
enabled = true
type = "process"
severity = "high"
action = "alert"
parent_names = ["nginx", "apache2", "httpd"]
process_names = ["sh", "bash", "dash"]

# This example is also available as BUILTIN-SCENARIO-WEB-SHELL-001 with
# broader web parent and child process lists.

[[rules]]
id = "FILE-001"
name = "Sensitive file touched"
enabled = false
type = "file"
severity = "high"
action = "alert"
paths = ["/etc/passwd", "/etc/shadow", "/etc/sudoers"]
operations = ["file_open", "file_write", "file_unlink", "file_rename"]
patterns = []

# Credential access is also covered by BUILTIN-SCENARIO-CREDENTIAL-ACCESS-001,
# including common SSH key names and *.kdbx files.

[[rules]]
id = "NET-001"
name = "Suspicious outbound port"
enabled = false
type = "network"
severity = "medium"
action = "alert"
direction = "outbound"
ports = [4444, 1337, 31337]

# Reverse shell behavior additionally correlates process_start with
# network_connect in BUILTIN-SCENARIO-REVERSE-SHELL-001. Set both network
# enable flags to true before demoing it.

[[detections.persistence]]
name = "systemd_service_modified"
paths = ["/etc/systemd/system/", "/usr/lib/systemd/system/", "/run/systemd/system/"]
patterns = ["*.service"]
operations = ["file_open", "file_write", "file_rename", "file_unlink"]

[[detections.persistence]]
name = "cron_modified"
paths = ["/etc/cron.d/", "/etc/cron.daily/", "/etc/crontab"]
operations = ["file_open", "file_write", "file_rename", "file_unlink"]

[[detections.network]]
name = "suspicious_outbound_port"
directions = ["outbound"]
ports = [4444, 1337, 31337]

[output]
type = "stdout" # stdout is supported by the current MVP runtime
format = "json"

[performance]
max_events_per_second = 5000
drop_when_full = true
